version: "3.9"

services:

  backend:
    build:
      context: .
      target: back
    container_name: microcrm-back
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: front
    container_name: microcrm-front
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    restart: unless-stopped