name: CI/CD - Orion CRM

# ============================================================
# WHEN THE PIPELINE STARTS
# ============================================================
on:
  # Launch pipeline when code is pushed to main
  push:
    branches: ["main"]

  # Launch pipeline when a Pull Request targets main
  pull_request:
    branches: ["main"]

  # Launch pipeline automatically every day at 02:00 UTC
  schedule:
    - cron: "0 2 * * *"

# ============================================================
# CANCEL OLD RUNS ON SAME BRANCH
# Saves GitHub Actions minutes
# ============================================================
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# JOBS
# Each job runs independently in its own virtual machine
# ============================================================
jobs:

  # ==========================================================
  # JOB 1 - BACKEND TESTS
  # Spring Boot + Gradle + JUnit
  # ==========================================================
  test-backend:

    # Job name shown in GitHub Actions UI
    name: "Backend Tests"

    # GitHub creates an Ubuntu virtual machine
    runs-on: ubuntu-latest

    # Steps executed one after another
    steps:

      # Download project source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Install Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Make shell script executable
      - name: Make script executable
        run: chmod +x ./run-tests.sh

      # Execute backend tests
      - name: Run backend tests
        run: ./run-tests.sh --backend-only

      # Save test reports as GitHub artifact
      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: back/build/test-results/

  # ==========================================================
  # JOB 2 - FRONTEND TESTS
  # Angular + Karma + Jasmine
  # ==========================================================
  test-frontend:

    name: "Frontend Tests"

    runs-on: ubuntu-latest

    steps:

      # Download source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Make script executable
      - name: Make script executable
        run: chmod +x ./run-tests.sh

      # Run frontend tests
      - name: Run frontend tests
        run: ./run-tests.sh --frontend-only

      # Upload frontend reports
      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: front/test-results/

  # ==========================================================
  # JOB 3 - SONARQUBE ANALYSIS
  # Code quality / bugs / vulnerabilities
  # ==========================================================
  sonarqube:

    name: "SonarQube Analysis"

    runs-on: ubuntu-latest

    # This job starts ONLY after backend and frontend tests
    needs: [test-backend, test-frontend]

    steps:

      # Download source code
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Execute SonarQube analysis
      - name: Run SonarQube analysis
        run: ./back/gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ==========================================================
  # JOB 4 - BUILD BACKEND DOCKER IMAGE
  # ==========================================================
  build-backend:

    name: "Build Backend Docker"

    runs-on: ubuntu-latest

    # Start only after backend tests
    needs: [test-backend]

    # Run only when pushing on main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:

      # Download source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Login to GitHub Docker Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image and push it
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          path: ../Dockerfile
          context: ./back
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest

  # ==========================================================
  # JOB 5 - BUILD FRONTEND DOCKER IMAGE
  # ==========================================================
  build-frontend:

    name: "Build Frontend Docker"

    runs-on: ubuntu-latest

    needs: [test-frontend]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:

      # Download source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Login to GitHub Docker Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          path: ../Dockerfile
          context: ./front
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest